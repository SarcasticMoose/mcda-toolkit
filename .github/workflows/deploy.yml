name: deploy
run-name: Release ${{ github.ref_name }}

on:
  push:
    branches:
    - master

env:
  NuGetDirectory: ${{ github.workspace }}/nuget

jobs:
  precondition:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prelease: ${{ steps.version.outputs.is-prelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*?(?=</Version>)' Directory.Build.props)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" =~ - ]]; then
            echo "is-prelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-prelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag exists
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          git fetch --tags

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists."
            exit 1
          fi

  build:
    needs: precondition
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: |
          dotnet pack \
            --configuration Release \
            --no-build \
            --output ${{ env.NuGetDirectory }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: |
            ${{ env.NuGetDirectory }}/*.nupkg

  tag:
    needs: [precondition, build]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.precondition.outputs.version }}
          SHA: ${{ github.sha }}
        with:
          script: |
            const version = process.env.VERSION;
            const sha = process.env.SHA;
            const tag = `v${version}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha
            });

  deploy:
    needs: tag
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish packages to NuGet
        shell: pwsh
        run: |
          Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Filter *.nupkg |
          ForEach-Object {
              dotnet nuget push $_.FullName `
                --api-key "${{ secrets.NUGET_KEY }}" `
                --source https://api.nuget.org/v3/index.json `
                --skip-duplicate
          }

  release:
    needs: [deploy, precondition]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.precondition.outputs.version }}
          name: Release v${{ needs.precondition.outputs.version }}
          body: Release version ${{ needs.precondition.outputs.version }}
          artifacts: |
            ${{ env.NuGetDirectory }}/*.nupkg
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ needs.precondition.outputs.is-prelease }}
